<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram UI Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- PROFILE SCREEN -->

    <section class="phone">

       <header class="top-bar">
    <div style="display:flex;align-items:center;gap:8px;">
        <i class="fa-solid fa-lock"></i>
        <h3>blooming_haze</h3>
    </div>

    <div class="icons">
        <i class="fa-solid fa-plus"></i>
        <i class="fa-solid fa-bars"></i>
    </div>
</header>

        <div class="profile-section">

            <img src="assets/profile.jpg" class="profile-pic">

            <div class="stats">

                <div>
                    <h4>40</h4>
                    <span>Posts</span>
                </div>

                <div>
                    <h4>91</h4>
                    <span>Followers</span>
                </div>

                <div>
                    <h4>21</h4>
                    <span>Following</span>
                </div>

            </div>

        </div>

        <div class="bio">
            <h4>Mystora</h4>
            <p>Lost in the haze, chasing clarity ✨</p>
        </div>

        <div class="buttons">
            <button>Edit Profile</button>
            <button>Share Profile</button>
        </div>

        <div class="highlights">

            <div class="highlight">
                <img src="assets/highlight1.jpg">
                <p>Cars</p>
            </div>

            <div class="highlight">
                <img src="assets/highlight2.jpg">
                <p>Dark</p>
            </div>

            <div class="highlight">
                <img src="assets/highlight3.jpg">
                <p>Art</p>
            </div>

        </div>
<div class="tabs">
    <i class="fa-solid fa-table-cells"></i>
    <i class="fa-regular fa-circle-play"></i>
    <i class="fa-regular fa-user"></i>
</div>
        <div class="profile-grid">
            <img src="assets/post1.jpg">
            <img src="assets/post2.jpg">
            <img src="assets/post3.jpg">
            <img src="assets/post4.jpg">
            <img src="assets/post5.jpg">
            <img src="assets/post6.jpg">
            <img src="assets/post7.jpg">
            <img src="assets/post8.jpg">
            <img src="assets/post9.jpg">
        </div>

        <nav class="bottom-nav">
            <i class="fa-solid fa-house"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-square-plus"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-user"></i>
        </nav>

    </section>

    <!-- HOME SCREEN -->

    <section class="phone">

        <header class="top-bar">
            <h2 style="font-family:cursive;">Instagram</h2>

            <div class="icons">
                <i class="fa-regular fa-heart"></i>
                <i class="fa-regular fa-paper-plane"></i>
            </div>
        </header>

        <div class="stories">

            <div class="story">
                <img src="assets/story1.jpg">
                <p>You</p>
            </div>

            <div class="story">
                <img src="assets/story2.jpg">
                <p>Floral</p>
            </div>

            <div class="story">
                <img src="assets/story3.jpg">
                <p>Saurabh</p>
            </div>

            <div class="story">
                <img src="assets/story4.jpg">
                <p>Anime</p>
            </div>

        </div>

        <div class="post">

            <div class="post-header">

                <div class="user">

                    <img src="assets/profile.jpg">

                    <div>
                        <h4>Animeworld</h4>
                        <small>Suggested for you</small>
                    </div>

                </div>

                <i class="fa-solid fa-ellipsis"></i>

            </div>

            <img src="assets/feed-post.jpg" class="feed-image">

            <div class="actions">

                <div class="left">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-paper-plane"></i>
                </div>

                <i class="fa-regular fa-bookmark"></i>

            </div>

            <p><strong>120 likes</strong></p>

            <p>
                <strong>animeworld</strong>
                Holding Life ✨
            </p>

        </div>

        <nav class="bottom-nav">
            <i class="fa-solid fa-house"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-square-plus"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-user"></i>
        </nav>

    </section>

    <!-- EXPLORE SCREEN -->

    <section class="phone">

       <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" placeholder="Search">
</div>

        <div class="explore-grid">

            <img src="assets/explore1.jpg" class="big">
            <img src="assets/explore2.jpg">
            <img src="assets/explore3.jpg">
            <img src="assets/explore4.jpg">
            <img src="assets/explore5.jpg">
            <img src="assets/explore6.jpg">
            <img src="assets/explore7.jpg">
            <img src="assets/explore8.jpg">
            <img src="assets/explore9.jpg">
            <img src="assets/explore10.jpg">
            <img src="assets/explore11.jpg">
            <img src="assets/explore12.jpg">
            <img src="assets/explore13.jpg">
            <img src="assets/explore14.jpg">
            <img src="assets/explore15.jpg">
        </div>

        <nav class="bottom-nav">
            <i class="fa-solid fa-house"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-square-plus"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-user"></i>
        </nav>

    </section>

</div>

</body>
</html>
